
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Info Lookup and Additional Images</title>
    <link rel="stylesheet" href="/static/aimodal.css">
</head>
<body style="background-color: #74df9f; font-family: 'Roboto', sans-serif; margin: 0;">

    <!-- Navigation Header -->
    <header style="background-color: #fff; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.1);">
        <div style="display: flex; align-items: center; font-size: 22px; font-weight: 700; color: #333;">
            <img src="/static/aarablelogo.jpg" alt="AGROFIELD Logo" height="36" style="margin-right: 10px;"/>
            AGROFIELD
        </div>
        <nav style="display: flex; align-items: center; gap: 20px;">
            <a href="/" style="text-decoration: none; color: #333; font-weight: 500;">Home</a>
            <a href="/finance.html" style="text-decoration: none; color: #333; font-weight: 500;">Finance</a>
            <a href="/MainMedia.html" style="text-decoration: none; color: #333; font-weight: 500;">Media</a>
            <a href="/login.html" style="background-color: #4CAF50; color: #fff; padding: 8px 18px; border-radius: 5px; text-decoration: none; font-weight: 500;">Login</a>
        </nav>
    </header>

    <div class="container">
        <h1>Please Upload an Image..! </h1>

        
        <div class="upload-section">
            <label for="imageUpload">Upload Image:</label>
            <input type="file" id="imageUpload" accept="image/*">
            <button onclick="getImageInfo()">Get Info</button>
        </div>
        
        <!-- Preview of the uploaded image -->
        <div id="imagePreviewContainer">
            <img id="uploadedImagePreview">
        </div>
        
        <!-- Additional images -->
        <div id="additionalImagesContainer">
            <img id="additionalImage1">
            <img id="additionalImage2">
        </div>
        
         <!-- Information about the image -->
         <div id="info"></div>

        <!-- Spinner for processing -->
        <div id="loadingSpinner"></div>
    </div>

    <script src="/static/aimodal.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – AGROFIELD</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/login.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 40%, #52b788 100%);
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    header {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      padding: 14px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
    }

    .logo-wrap img {
      height: 36px;
      border-radius: 6px;
    }

    header nav {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    header nav a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: color .2s;
    }

    header nav a:hover {
      color: #fff;
    }

    .scan-nav-btn {
      background: #4CAF50;
      color: #fff !important;
      padding: 8px 18px;
      border-radius: 6px;
    }

    /* ── Card ── */
    .page-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 18px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      font-size: 26px;
      font-weight: 700;
      color: #1a472a;
      margin-bottom: 4px;
    }

    .card .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d0d0d0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color .2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #4CAF50;
    }

    .forgot {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 22px;
    }

    .forgot a {
      font-size: 13px;
      color: #4CAF50;
      text-decoration: none;
    }

    .error-box {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .btn-login:hover {
      background: #388e3c;
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
    }

    .divider hr {
      flex: 1;
      border: none;
      border-top: 1px solid #e0e0e0;
    }

    .divider span {
      font-size: 13px;
      color: #aaa;
    }

    .social-btns {
      display: flex;
      gap: 12px;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 1.5px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: #fff;
      color: #333;
      transition: background .2s;
      text-decoration: none;
    }

    .social-btn:hover {
      background: #f5f5f5;
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
    }

    .signup-label {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 22px;
    }

    .signup-label a {
      color: #4CAF50;
      font-weight: 600;
      text-decoration: none;
    }

    /* Demo hint */
    .demo-hint {
      margin-top: 18px;
      padding: 10px 14px;
      background: #f0faf0;
      border: 1px solid #b2dfb2;
      border-radius: 8px;
      font-size: 12px;
      color: #2d6a4f;
    }

    .demo-hint strong {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <header>
    <a href="/" class="logo-wrap">
      <img src="/static/aarablelogo.jpg" alt="AGROFIELD Logo" />
      AGROFIELD
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/finance.html">Finance</a>
      <a href="/MainMedia.html">Media</a>
      <a href="/aimodal.html" class="scan-nav-btn">Scan Now</a>
    </nav>
  </header>

  <!-- Login Card -->
  <div class="page-center">
    <div class="card">
      <h2>Welcome back 👋</h2>
      <p class="subtitle">Sign in to your AGROFIELD account</p>

      {% if error %}
      <div class="error-box">
        <span>⚠️</span> {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login.html">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required
            autocomplete="current-password" />
        </div>
        <div class="forgot"><a href="#">Forgot password?</a></div>
        <button type="submit" class="btn-login">Log in</button>
      </form>

      <div class="divider">
        <hr /><span>or continue with</span>
        <hr />
      </div>

      <div class="social-btns">
        <a href="#" class="social-btn">
          <!-- Google -->
          <svg viewBox="0 0 48 48">
            <path fill="#FFC107"
              d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.7-.4-3.9z" />
            <path fill="#FF3D00"
              d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" />
            <path fill="#4CAF50"
              d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z" />
            <path fill="#1976D2"
              d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C37 39.2 44 34 44 24c0-1.3-.1-2.7-.4-3.9z" />
          </svg>
          Google
        </a>
        <a href="#" class="social-btn">
          <!-- Apple -->
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.3.07 2.21.77 2.96.8 1.12-.22 2.2-.97 3.37-.83 1.42.18 2.49.82 3.18 2.07-2.93 1.75-2.44 5.62.49 6.76-.48 1.32-1.14 2.65-2 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" />
          </svg>
          Apple
        </a>
      </div>

      <p class="signup-label">Don't have an account? <a href="#">Sign up</a></p>

      <div class="demo-hint">
        <strong>🔑 Demo credentials:</strong>
        Email: <code>test@test.com</code> &nbsp;|&nbsp; Password: <code>test123</code>
      </div>
    </div>
  </div>

</body>

</html>
